{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Request Service</title>
  <link rel="stylesheet" href="{% static 'css/RequestService.css' %}">
</head>
<body>

  <div class="top-bar">
    <div class="left">💼 Freelance Platform</div>
    <div class="right">
      {% if user.is_authenticated %}
        <a href="{% url 'profile' %}">Profile</a>
        <a href="{% url 'logout' %}">Logout</a>
      {% else %}
        <a href="{% url 'register' %}">Register</a>
        <a href="{% url 'login' %}">Login</a>
      {% endif %}
    </div>
  </div>

  <nav class="navbar">
    <div class="logo">FP</div>
    <div class="links">
      <a href="{% url 'find_jobs' %}">Find Jobs</a>
      <a href="{% url 'list_services' %}">List Services</a>
    </div>
  </nav>

  <div class="container">
    <h1>Request Services</h1>

    <form method="POST" class="form">
      {% csrf_token %}

      <label>Service Title</label>
      <input type="text" name="title" placeholder="e.g. Website design" />

      <label>Description</label>
      <textarea name="description" placeholder="Describe what you need"></textarea>

      <button type="submit">Send Request</button>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      {% if success %}
        <div class="success">Request sent successfully ✓</div>
      {% endif %}
    </form>
  </div>

  <script src="{% static 'js/RequestService.js' %}"></script>
</body>
</html>
