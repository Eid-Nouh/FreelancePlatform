<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Support</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #F8F7F4;
            margin: 0;
            padding: 0;
        }

        /* Navbar */

        .navbar {
            background: white;
            padding: 20px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            border-bottom: 1px solid #ddd;
        }

        .navbar a {
            text-decoration: none;
            color: black;
            margin-left: 15px;
        }

        .navbar a:hover {
            color: #C6A97A;
        }

        /* Card */

        .container {
            width: 80%;
            margin: 100px auto;
        }

        .card {
            background: white;
            padding: 85px;
            border-radius: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        .card h1 {
            margin-bottom: 20px;
        }

        .card p {
            margin-bottom: 20px;
            color: #555;
        }

        .phone {
            font-size: 30px;
            margin: 20px 0;
        }

        .phone a {
            text-decoration: none;
            color: #C6A97A;
        }

        .email a {
            color: #C6A97A;
            text-decoration: none;
        }

        /* Footer */

        .footer {
            background: #2B2B2B;
            color: white;

            text-align: center;

            padding: 20px;

            margin-top: 50px;
        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <div class="navbar">

        <h2>LUMINA</h2>

        <div>
            <a href="/">Home</a>
            <a href="/jobs/">Jobs</a>
            <a href="/learn-more/">Learn More</a>
        </div>

    </div>


    <!-- Content -->

    <div class="container">

        <div class="card">

            <h1>Complaints & Support</h1>

            <p>
                If you have any complaint or question, contact us.
            </p>

            <div class="phone">

                <a href="tel:01101724507">
                    01101724507
                </a>

            </div>

            <p class="email">

                Email:
                <a href="mailto:support@gmail.com">
                    Mounir@gmail.com
                </a>

            </p>
        </div>
    </div>

    <!-- Footer -->

    <div class="footer">
        <p>2026 LUMINA - Support Team</p>
    </div>
</body>

</html>
