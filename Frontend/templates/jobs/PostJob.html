{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post a Job</title>

  <link rel="stylesheet" href="{% static 'css/PostJob.css' %}">
</head>

<body>

  <div class="container">

    <h1>Post a Job</h1>

    <form id="jobForm">

      <label>Job Title</label>
      <input type="text" id="title" placeholder="Enter job title">

      <label>Description</label>
      <textarea id="desc" placeholder="Enter job description"></textarea>

      <label>Budget</label>
      <input type="number" id="budget" placeholder="Enter budget">

      <button type="submit">Post Job</button>

    </form>

    <div id="message"></div>

  </div>

  <script src="PostJob.js"></script>

</body>
</html>
