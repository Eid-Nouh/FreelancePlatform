{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Find Jobs</title>

    <!-- CSS الصحيح -->
    <link rel="stylesheet" href="{% static 'css/jobs/find_jobs.css' %}">

</head>

<body>

    <div class="container">

        <h1>Available Jobs</h1>
        <div class="jobs">
            {% for job in jobs %}
            <div class="card">
                <h2>{{ job.title }}</h2>
                <p class="company">{{ job.company }}</p>
                <p class="budget">${{ job.budget }}</p>
                <a href="/jobs/{{ job.id }}/">View Details</a>
            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
