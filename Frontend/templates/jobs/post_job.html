{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Request Services</title>
    <link rel="stylesheet" href="{% static 'css/jobs/post_job.css' %}">
</head>
<body>

    <div class="container">
        <h1>Request Services</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Job Title">
            <input type="text" name="company" placeholder="Company">
            <input type="number" name="budget" placeholder="Budget">
            <textarea name="description" placeholder="Job Description"></textarea>
            <button type="submit">Request Services</button>

        </form>
    </div>
</body>
</html>
