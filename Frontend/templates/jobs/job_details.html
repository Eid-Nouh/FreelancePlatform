{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Job Details</title>

    <link rel="stylesheet" href="{% static 'css/jobs/job_details.css' %}">

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>{{ job.title }}</h1>

            <h3>{{ job.company }}</h3>

            <p>{{ job.description }}</p>

            <h2>Budget: ${{ job.budget }}</h2>

            <a href="/jobs/">Back</a>

        </div>

    </div>

</body>

</html>
