{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/accounts/register.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="register-container">
    <h2>Create Account</h2>
    
    <form method="post" class="register-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password1" required>
        </div>
        
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="password2" required>
        </div>
        
        <div class="form-group">
            <label>I am a:</label>
            <div class="radio-group">
                <label><input type="radio" name="user_type" value="client" checked> Client</label>
                <label><input type="radio" name="user_type" value="freelancer"> Freelancer</label>
            </div>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="terms" required> I agree to the <a href="#">Terms of Service</a>
            </label>
        </div>
        
        <button type="submit">Sign Up</button>
    </form>
    
    <p>Already have an account? <a href="{% url 'login' %}">Sign In</a></p>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/accounts/register.js' %}"></script>
{% endblock %}
