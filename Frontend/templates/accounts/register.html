{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – LUMINA</title>
    <link rel="stylesheet" href="{% static 'css/accounts/register.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="page-center">
    <div class="register-box">

        <h2>Create Account</h2>

        <!-- Error message from the server -->
        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}

        <form method="post" id="registerForm">
            {% csrf_token %}

            <!-- Always freelancer, no need to show it -->
            <input type="hidden" name="user_type" value="freelancer">

            <label>Username</label>
            <input type="text" name="username" required>

            <label>Email Address</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password1" id="password1" required>

            <label>Confirm Password</label>
            <input type="password" name="password2" id="password2" required>

            <label class="checkbox-label">
                <input type="checkbox" name="terms" id="terms" required>
                I agree to the <a href="#">Terms of Service</a>
            </label>

            <button type="submit">Sign Up</button>
        </form>

        <p class="link-text">Already have an account? <a href="{% url 'login' %}">Sign In</a></p>

    </div>
</div>

<script src="{% static 'js/accounts/register.js' %}"></script>
</body>
</html>
