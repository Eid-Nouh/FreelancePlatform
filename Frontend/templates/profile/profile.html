{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile - Freelance Platform</title>
  <link rel="stylesheet" href="{% static 'css/Profile.css' %}">
</head>
<body>
  <div class="top-bar">
    <div class="left">💼 Freelance Platform</div>
    <div class="right">
      {% if user.is_authenticated %}
        <a href="{% url 'logout' %}">Logout</a>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
      {% endif %}
    </div>
  </div>

  <nav class="navbar">
    <div class="logo">FP</div>
    <div class="links">
      <a href="{% url 'find_jobs' %}">Jobs</a>
      <a href="{% url 'list_services' %}">Services</a>
    </div>
  </nav>

  <div class="container">
    <h1>Your Profile</h1>

    {% if saved %}
      <div class="saved">Profile saved ✓</div>
    {% endif %}

    <div class="info">
      <p><strong>Username:</strong> {{ user.username }}</p>
      <p><strong>Email:</strong> {{ user.email }}</p>
    </div>

    <form method="POST" class="form">
      {% csrf_token %}

      <label>Skills</label>
      <input type="text" name="skills" value="{{ profile_obj.skills }}" placeholder="e.g. Python, Design, Writing">

      <label>Bio</label>
      <textarea name="bio" placeholder="Write a short bio...">{{ profile_obj.bio }}</textarea>

      <button type="submit">Save Profile</button>
    </form>
  </div>

  <script src="{% static 'js/Profile.js' %}"></script>
</body>
</html>
